name: CI — KrushRock

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── FRONTEND: verifica que el build de React no rompa ────────────────────────
  frontend-build:
    name: Frontend build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: krushrock-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: krushrock-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

  # ── BACKEND: verifica que Python importa sin errores ────────────────────────
  backend-check:
    name: Backend syntax check (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports
        run: python -c "from app.main import app; print('Backend OK')"
        env:
          ANTHROPIC_API_KEY: test-key
          SECRET_KEY: test-secret-key-32chars-minimum-ok
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_KEY: placeholder-key
          SUPABASE_SERVICE_KEY: placeholder-key

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: test-key
          SECRET_KEY: test-secret-key-32chars-minimum-ok
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_KEY: placeholder-key
          SUPABASE_SERVICE_KEY: placeholder-key
